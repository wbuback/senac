<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Taskschool - Gerencie suas tarefas de forma simples e eficiente">
    <title>Taskschool — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Taskschool</h1>
            <p>Seu gerenciador de tarefas pessoal</p>
            <nav>
                <ul>
                    <li><a href="index.html">Login</a></li>
                    <li><a href="nova-tarefa.html">Nova Tarefa</a></li>
                    <li><a href="tabela.html">Tabela</a></li>
                    <li><a href="cards.html">Cards</a></li>
                    <li><a href="estatisticas.html">Estatísticas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section id="login" class="secao-form secao-login">
                <h2>Login</h2>

                <form id="login-form" action="estatisticas.html" method="get">
                    <div class="form-grupo">
                        <label for="login-email">E-mail</label>
                        <input
                            type="email"
                            id="login-email"
                            name="email"
                            placeholder="seu@email.com"
                            value="aluno@senac.br"
                            required
                        >
                    </div>

                    <div class="form-grupo">
                        <label for="login-senha">Senha</label>
                        <input
                            type="password"
                            id="login-senha"
                            name="senha"
                            placeholder="Digite sua senha"
                            value="senac123"
                            required
                        >
                        <small class="dica">Demo: aluno@senac.br / senac123</small>
                    </div>

                    <div class="form-acoes">
                        <button type="submit" class="btn btn-primario">Entrar</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Taskschool &mdash; Projeto Educacional SENAC</p>
            <p>Desenvolvido na disciplina de Desenvolvimento Frontend (UC2)</p>
        </div>
    </footer>
</body>
</html>
